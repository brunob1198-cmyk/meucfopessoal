        "mainEntity": [
          {"@type":"Question","name":"Como faço para lançar meu patrimônio?","acceptedAnswer":{"@type":"Answer","text":"Acesse o Balanço Patrimonial no menu lateral. Clique em 'Novo Ativo' para cadastrar bens (imóveis, investimentos, veículos) ou 'Novo Passivo' para dívidas. O patrimônio líquido é calculado automaticamente."}},
          {"@type":"Question","name":"Quais são os passos para fazer lançamentos?","acceptedAnswer":{"@type":"Answer","text":"Na tela de Lançamentos, localize a subcategoria desejada. Clique no '+' à direita, preencha valor, data e comentário, e clique em Salvar. Para compras parceladas, ative 'Parcelado' e informe o valor total e número de parcelas."}},
          {"@type":"Question","name":"Como posso importar meus extratos bancários?","acceptedAnswer":{"@type":"Answer","text":"Você pode importar via Excel (baixe o modelo, preencha e faça upload) ou conectar contas bancárias automaticamente via Open Finance em 'Contas Conectadas'."}},
          {"@type":"Question","name":"De que forma funciona o Consultor Financeiro IA?","acceptedAnswer":{"@type":"Answer","text":"Acesse Inteligência, selecione o período e clique em 'Gerar Análise'. A IA analisa seus lançamentos e gera insights, alertas e previsões personalizadas."}},
          {"@type":"Question","name":"Como é possível criar metas financeiras?","acceptedAnswer":{"@type":"Answer","text":"Use o Mapa de Sonhos Financeiros para criar objetivos. Defina nome, valor, valor acumulado e data. O sistema calcula o valor mensal necessário e monitora o progresso."}},
          {"@type":"Question","name":"Como acompanhar o score de saúde financeira?","acceptedAnswer":{"@type":"Answer","text":"O Score de Saúde Financeira calcula uma nota de 0 a 100 com base em 5 pilares: poupança, controle de despesas, liquidez, endividamento e reserva de emergência."}},
          {"@type":"Question","name":"Como compartilhar dados com um contador?","acceptedAnswer":{"@type":"Answer","text":"Em Meu Perfil, use 'Compartilhamento de Acesso'. Informe o e-mail, selecione a permissão e envie o convite."}},
          {"@type":"Question","name":"O que é o planejador e qual sua finalidade?","acceptedAnswer":{"@type":"Answer","text":"O Planejador é sua ferramenta de orçamento mensal. Defina o que pretende gastar em cada categoria. Os valores aparecem em verde no DRE para comparar planejado vs realizado."}}
